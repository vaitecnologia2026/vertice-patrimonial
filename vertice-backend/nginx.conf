# /etc/nginx/sites-available/vertice
server {
    listen 80;
    listen [::]:80;
    server_name seudominio.com.br www.seudominio.com.br;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name seudominio.com.br www.seudominio.com.br;

    # SSL — gerado pelo Certbot
    ssl_certificate     /etc/letsencrypt/live/seudominio.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/seudominio.com.br/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Segurança
    add_header X-Frame-Options           "SAMEORIGIN"                   always;
    add_header X-Content-Type-Options    "nosniff"                      always;
    add_header X-XSS-Protection          "1; mode=block"                always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), microphone=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/html text/css application/json application/javascript;
    gzip_min_length 1000;
    gzip_vary on;

    # Frontend — arquivo estático
    root /var/www/vertice;
    index vertice-vai.html;

    # Cache de assets
    location ~* \.(html|css|js|ico|png|jpg|svg|woff2)$ {
        expires 1h;
        add_header Cache-Control "public, no-transform";
    }

    # API — proxy para o backend Node.js
    location /api/ {
        proxy_pass          http://127.0.0.1:4000;
        proxy_http_version  1.1;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout  60s;
        proxy_connect_timeout 10s;
        client_max_body_size 15M;
    }

    # Uploads
    location /uploads/ {
        alias /var/www/vertice-api/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /vertice-vai.html;
    }
}
